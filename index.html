<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="./assets/js/sidebar.js" defer></script>
  <script src="./assets/js/readingtime.js" defer></script>
  <script type="text/javascript" src="./assets/js/darkmode.js" defer></script>
  <!-- Include MathJax from CDN -->
  <script type="text/javascript" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>

          tex: {

              processEscapes: false
          },
          "HTML-CSS": {
            font: "TeX", // Choose the font (TeX, STIX, MathJax, Asana-Math)
            undefinedFamily: "serif",  // Fallback font for MathJax
            mtextFont: "Poppins",  // Apply Poppins to text parts (e.g., \text{} in math)
            mathVariant: "normal"  // Ensure that math is rendered normally, not slanted
          }
      };
      
  </script>
</head>
<body>
  <header>
    <!-- THEME SWITCH BUTTON
     (SVGs inlined in code) -->

    </button>

    <!-- HAMBURGER BUTTON 
      To open side navbar - check sidebar.js -->
    <button id="open-sidebar-button" onclick="openSidebar()" aria-label="open sidebar" aria-expanded="false" aria-controls="navbar">
      <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#c9c9c9"><path d="M165.13-254.62q-10.68 0-17.9-7.26-7.23-7.26-7.23-18t7.23-17.86q7.22-7.13 17.9-7.13h629.74q10.68 0 17.9 7.26 7.23 7.26 7.23 18t-7.23 17.87q-7.22 7.12-17.9 7.12H165.13Zm0-200.25q-10.68 0-17.9-7.27-7.23-7.26-7.23-17.99 0-10.74 7.23-17.87 7.22-7.13 17.9-7.13h629.74q10.68 0 17.9 7.27 7.23 7.26 7.23 17.99 0 10.74-7.23 17.87-7.22 7.13-17.9 7.13H165.13Zm0-200.26q-10.68 0-17.9-7.26-7.23-7.26-7.23-18t7.23-17.87q7.22-7.12 17.9-7.12h629.74q10.68 0 17.9 7.26 7.23 7.26 7.23 18t-7.23 17.86q-7.22 7.13-17.9 7.13H165.13Z"/></svg>

    <nav id="navbar">
      <!-- CROSS BUTTON
      To close side navbar - check sidebar.js
      Important to keep it in the nav (as it is part of the navigation system), 
      but outside the <ul> element - otherwise, it would behave like 
      a menu item and shift layout -->

        <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#c9c9c9"><path d="m480-444.62-209.69 209.7q-7.23 7.23-17.5 7.42-10.27.19-17.89-7.42-7.61-7.62-7.61-17.7 0-10.07 7.61-17.69L444.62-480l-209.7-209.69q-7.23-7.23-7.42-17.5-.19-10.27 7.42-17.89 7.62-7.61 17.7-7.61 10.07 0 17.69 7.61L480-515.38l209.69-209.7q7.23-7.23 17.5-7.42 10.27-.19 17.89 7.42 7.61 7.62 7.61 17.7 0 10.07-7.61 17.69L515.38-480l209.7 209.69q7.23 7.23 7.42 17.5.19 10.27-7.42 17.89-7.62 7.61-17.7 7.61-10.07 0-17.69-7.61L480-444.62Z"/></svg>
      </button>
      <ul>
        <li><a href="#" onclick="loadContent('./pages/home.html', this)">Home</a></li>
        <li><a href="#" onclick="loadContent('./pages/posts.html', this)">Posts</a></li>
        <li><a href="#" onclick="loadContent('./pages/projects.html', this)">Projects</a></li>
        <li><a href="#" onclick="loadContent('./pages/about.html', this)">About</a></li>
      </ul>
    </nav>

    <div id="overlay" onclick="closeSidebar()" aria-hidden="true"></div>
  </header>
  
  <main id="content-area">
        <!-- Default content loaded here -->
  </main>

  <script>
    // Function to load content dynamically from external HTML files
    function loadContent(page, clickedLink) {
        // First, remove the 'active' class from all navigation links
        const navLinks = document.querySelectorAll('#navbar a');
        navLinks.forEach(link => {
            link.classList.remove('active-link');
        });

        // Then, add the 'active' class to the clicked link
        clickedLink.classList.add('active-link');

        fetch(page)
            .then(response => response.text()) // Read the HTML as text
            .then(data => {
                // Inject the content into the content-area
                document.getElementById('content-area').innerHTML = data;
                
                calculatePostCardReadingTimes();
                
                // Reprocess MathJax content after loading new content
                MathJax.typesetPromise()
                    .then(() => {
                        console.log("MathJax has processed the equations.");
                    })
                    .catch(err => {
                        console.error("MathJax typesetting error:", err);
                    });
                // Re-highlight newly loaded code
                document.querySelectorAll('pre code').forEach((block) => {
                  hljs.highlightElement(block);
                });
            })
            .catch(error => {
                console.error('Error loading the content:', error);
                document.getElementById('content-area').innerHTML = "<p>Sorry, there was an error loading the page.</p>";
            });
    }

    // Load the home content by default on page load
    window.onload = function() {
        loadContent('home.html');
    };
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    hljs.highlightAll();
  </script>
  
</body>
</html>
